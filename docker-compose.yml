services:
  config-server:
    container_name: ms-config-server
    build: /config-server
    ports:
      - "8888:8888"
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 1" ]
      interval: 5s
      start_period: 30s

  discovery-service:
    container_name: ms-discovery-service
    build: /discovery
    ports:
      - "8761:8761"
    environment:
#      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1" ]
      interval: 5s
      start_period: 30s
    depends_on:
      config-server:
        condition: service_healthy

  customer-service:
    container_name: ms-customer-service
    build: /customer
    ports:
      - "8090:8090"
    environment:
#      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/customer
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: customer-service
    networks:
      - microservices-net
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  product-service:
    container_name: ms-product-service
    build: /product
    ports:
      - "8050:8050"
    environment:
#      - SPRING_PROFILES_ACTIVE=docker
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/product
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: product-service
    networks:
      - microservices-net
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy

  payment-service:
    container_name: ms-payment-service
    build: /payment
    ports:
      - "8060:8060"
    environment:
#      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: payment-service
#      SPRING_KAFKA_PRODUCER_BOOTSTRAPSERVER: kafka:9092
      SPRING_KAFKA_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - microservices-net
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  order-service:
    container_name: ms-order-service
    build: /order
    ports:
      - "8070:8070"
    environment:
      #SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: order-service
      #SPRING_KAFKA_PRODUCER_BOOTSTRAPSERVER: kafka:9092
      SPRING_KAFKA_BOOTSTRAPSERVERS: kafka:9092
      APPLICATION_CONFIG_CUSTOMERURL: http://api-gateway:8222/api/v1/customers
      APPLICATION_CONFIG_PRODUCTURL: http://api-gateway:8222/api/v1/products
      APPLICATION_CONFIG_PAYMENTURL: http://api-gateway:8222/api/v1/payments
    networks:
      - microservices-net
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    container_name: ms-notification-service
    build: /notification
    ports:
      - "8040:8040"
    environment:
#      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: notification-service
      SPRING_KAFKA_CONSUMER_BOOTSTRAPSERVERS: kafka:9092
      SPRING_KAFKA_BOOTSTRAPSERVERS: kafka:9092
      SPRING_MONGODB_URI: mongodb://erenb:123456@mongodb:27017/notification?authSource=admin&uuidRepresentation=standard
      SPRING_MAIL_HOST: mail-dev
    networks:
      - microservices-net
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-gateway:
    container_name: ms-api-gateway
    build: /api-gateway
    ports:
      - "8222:8222"
    environment:
#      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: api-gateway
    networks:
      - microservices-net
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy


  # --------------------- External services ------------------------------ #
  postgres:
    container_name: ms_pg_sql
    image: postgres
    environment:
      POSTGRES_USER: erenb
      POSTGRES_PASSWORD: 123456
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    networks:
      - microservices-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U erenb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    container_name: ms-kafka
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_KRAFT_MODE: "true"

      CLUSTER_ID: '1L6g7nGhU-eAKfL--X25wo'
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      #KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      #KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      #KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 --version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    #volumes:
    #  - kafka_kraft:var/lib/kafka/data


  mongodb:
    container_name: ms_mongo_db
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo:/data
    networks:
      - microservices-net
    environment:
      MONGO_INITDB_ROOT_USERNAME: erenb
      MONGO_INITDB_ROOT_PASSWORD: 123456
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --eval 'db.runCommand({ping:1})' --quiet" ]
      interval: 10s
      timeout: 5s
      retries: 5


  mail-dev:
    container_name: ms_mail_dev
    image: maildev/maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - microservices-net

networks:
  microservices-net:

volumes:
  postgres:
  pgadmin:
  mongo:
  #kafka_kraft: